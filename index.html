function makeData(arr) {
  const [name, region, pharmacist, grade, sales, salesTrend, returnRate, debt, monthGoal, pbPct, maySales, aprSales, catPro, catGen, catHs, genProds] = arr;

  const monthCurrent = sales;
  const monthDay = 15;
  const monthDays = 30;

  // Daily accumulation curve
  const daily = [0];
  for (let i = 1; i <= monthDays; i++) {
    if (i >= monthDay) daily.push(monthCurrent);
    else daily.push(Math.round(monthCurrent * i / monthDay));
  }

  // Category ratios
  const catRatio = { pro: catPro, gen: catGen, hs: catHs, pb: pbPct };
  const annualize = sales > 0 ? sales * 2 : (maySales || 1000000);
  const catSales = {
    pro: Math.round(annualize * catPro / 100),
    gen: Math.round(annualize * catGen / 100),
    hs: Math.round(annualize * catHs / 100),
    pb: Math.round(annualize * pbPct / 100)
  };

  const trendUp = salesTrend.startsWith('+');
  const catTrend = {
    pro: trendUp ? '+' + (Math.floor(Math.random()*8)+2) + '%' : '-' + (Math.floor(Math.random()*8)+2) + '%',
    gen: trendUp ? '+' + (Math.floor(Math.random()*5)+1) + '%' : '-' + (Math.floor(Math.random()*5)+1) + '%',
    hs: '+' + (Math.floor(Math.random()*12)+3) + '%',
    pb: salesTrend
  };

  // Product lists — use real gen products where available, fill with generics
  const defaultProItems = ['아모디핀5mg','리피토10mg','메트포르민500mg','오메프라졸20mg','엘트로신','암로디핀','디아미크롱','바이엘아스피린'];
  const defaultHsItems = ['센트룸종합비타민','오메가31000mg','프로바이오틱스60포','루테인','밀크씨슬','콜라겐'];
  const pbItemPool = ['태전 종합비타민','태전 프로바이오 30포','태전 칼슘마그네슘','태전 오메가3','태전 위장약','TJ팜 루테인','TJ팜 밀크씨슬','서울태전 비타민C'];

  function gT(items, total, maxC) {
    const c = Math.min(items.length, Math.max(1, maxC));
    return items.slice(0, c).map((n, i) => ({ name: n, sales: Math.max(10000, Math.round(total / c * (1.5 - i * 0.15))) }));
  }

  const salesCount = Math.max(1, Math.floor(sales / 500000));
  const proTop = gT(defaultProItems, catSales.pro, Math.min(8, salesCount + 2));
  const genTop = genProds.length > 0
    ? genProds.map((n, i) => ({ name: n, sales: Math.max(10000, Math.round(catSales.gen / genProds.length * (1.4 - i * 0.15))) }))
    : gT(['타이레놀500mg','판콜에이','훼스탈골드','게보린','활명수'], catSales.gen, Math.min(5, salesCount));
  const hsTop = gT(defaultHsItems, catSales.hs, Math.min(5, salesCount));
  const pbTop = pbPct > 0
    ? pbItemPool.slice(0, Math.min(5, Math.max(1, Math.floor(pbPct / 3)))).map((n, i) => ({
        name: n,
        qty: Math.max(1, Math.round((annualize * pbPct / 100) / pbItemPool.length / 80000)),
        sales: Math.round((annualize * pbPct / 100) / Math.max(1, Math.floor(pbPct / 3)) * (1.3 - i * 0.15))
      }))
    : [];

  return {
    name, region, pharmacist, grade, sales, salesTrend, returnRate, debt,
    monthGoal, monthCurrent, monthDay, monthDays, maySales, aprSales,
    daily, proTop, genTop, hsTop, pbTop,
    catRatio, catSales, catTrend,
    pb3mAvg: Math.round((annualize * pbPct / 100) * 0.9),
    news: NEWS,
    memo: []
  };
}

function fmt(n) {
  if (n === 0) return '없음';
  if (n >= 100000000) return (n/100000000).toFixed(1) + '억';
  if (n >= 10000000) return (n/10000000).toFixed(1) + '천만';
  if (n >= 10000) return Math.round(n/10000) + '만원';
  return n.toLocaleString() + '원';
}

function onQuery() {
  const q = document.getElementById('Q').value.trim();
  const dd = document.getElementById('Dropdown');
  const all = Object.keys(DATA);
  if (!q) {
    dd.innerHTML = '<div class="dd-count">담당 거래처 (총 ' + all.length + '곳) — 글자 입력 시 검색됩니다</div>' +
      all.slice(0, 8).map(ddRow).join('');
    dd.style.display = 'block';
    return;
  }
  const matches = all.filter(n => n.includes(q));
  if (matches.length === 0) {
    dd.innerHTML = '<div class="dd-empty">"' + q + '" 매칭 거래처 없음</div>';
  } else {
    dd.innerHTML = '<div class="dd-count">' + matches.length + '곳 매칭</div>' + matches.map(ddRow).join('');
  }
  dd.style.display = 'block';
}

function ddRow(name) {
  const d = DATA[name];
  const gCls = d.grade === 'B' ? 'dd-grade dd-grade-B' : d.grade === 'C' ? 'dd-grade dd-grade-C' : 'dd-grade';
  const tCls = d.salesTrend.startsWith('+') ? 'up' : d.salesTrend === '0%' ? 'neutral' : 'down';
  return '<div class="dd-item" onclick="pick('' + name.replace(/'/g,"\'"+'') + '')"><div><span class="dd-name">' + name + '</span><span class="' + gCls + '">' + d.grade + '</span></div><div class="dd-sub">' + d.region + ' · ' + d.pharmacist + ' · 이번달 ' + fmt(d.sales) + ' (<span class="' + tCls + '">' + d.salesTrend + '</span>)</div></div>';
}

function pick(name) {
  document.getElementById('Q').value = name;
  document.getElementById('Dropdown').style.display = 'none';
  render(name);
}

function doSearch() {
  const q = document.getElementById('Q').value.trim();
  if (!q) return;
  const found = Object.keys(DATA).find(k => k.includes(q));

}

function renderTab(name, tab) {
  const d = DATA[name];

  else { list = d.pbTop; label = 'PB'; catClass = 'pb'; }
  const total = list.reduce((s, x) => s + x.sales, 0);
  let h = '<div class="tab-summary">';
  h += '<div class="tab-sum-item"><span class="tab-sum-label">' + label + ' 품목</span><span class="tab-sum-val">' + list.length + '개</span></div>';
  h += '<div class="tab-sum-item"><span class="tab-sum-label">매출 합계</span><span class="tab-sum-val">' + fmt(total) + '</span></div>';
  h += '<div class="tab-sum-item"><span class="tab-sum-label">비중</span><span class="tab-sum-val">' + d.catRatio[tab] + '%</span></div>';

  h += '<div class="tab-sum-item"><span class="tab-sum-label">전월 대비</span><span class="tab-sum-val ' + tCls + '">' + d.catTrend[tab] + '</span></div>';

  });
  return h;
}

  } else {
    d.memo.forEach((m, idx) => {
      html += '<div class="memo-item"><div class="memo-time">' + m.time + '</div><div>' + m.text + '</div>';
      if (m.ai) html += '<div class="ai-box"><strong>🤖 메모:</strong> ' + m.ai + '</div>';
      html += '</div>';
    });
  }
  html += '</div>';

  document.getElementById('Result').innerHTML = html;

  // Destroy existing charts
  const dc = Chart.getChart('DailyChart');
  const cc = Chart.getChart('CatChart');
  if (dc) dc.destroy();
  if (cc) cc.destroy();

  setTimeout(() => {
    drawDaily(d.daily, d.monthGoal, d.monthDays, d.monthDay);
    drawCat(d.catRatio);
  }, 80);
}

function drawDaily(data, goal, days, today) {
  const ctx = document.getElementById('DailyChart');
  if (!ctx) return;
  const goalLine = [];
  for (let i = 0; i <= days; i++) goalLine.push(Math.round(goal / days * i));
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: Array.from({length: days+1}, (_,i) => i),
      datasets: [
        { label: '실제 누적', data: data, borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.1)', fill: true, tension: 0.3, pointRadius: 0 },
        { label: '목표선', data: goalLine, borderColor: '#888780', borderDash: [4,4], fill: false, pointRadius: 0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, position: 'bottom', labels: { font: { size: 11 } } } },
      scales: {
        y: { beginAtZero: true, ticks: { font: { size: 10 }, callback: v => (v/10000).toFixed(0) + '만' } },
        x: { ticks: { font: { size: 10 }, callback: (v,i) => i % 5 === 0 ? i + '일' : '' } }
      }
    }
  });
}

function drawCat(ratio) {
  const ctx = document.getElementById('CatChart');
  if (!ctx) return;
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['전문약','일반약','건기식','PB'],
      datasets: [{ data: [ratio.pro, ratio.gen, ratio.hs, ratio.pb], backgroundColor: ['#378ADD','#EF9F27','#97C459','#7F77DD'], borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'right', labels: { font: { size: 12 } } },
        tooltip: { callbacks: { label: c => c.label + ': ' + c.parsed + '%' } }
      },
      cutout: '60%'
    }
  });
}

const MEMO_KEY = 'oneclick-smalltalk-kim-memos';
function loadMemosFromStorage() {
  try {
    const saved = localStorage.getItem(MEMO_KEY);
    if (!saved) return;
    const memos = JSON.parse(saved);
    Object.keys(memos).forEach(name => { if (DATA[name]) DATA[name].memo = memos[name]; });
  } catch(e) {}
}
function saveMemosToStorage() {
  try {
    const memos = {};
    Object.keys(DATA).forEach(name => { if (DATA[name].memo && DATA[name].memo.length > 0) memos[name] = DATA[name].memo; });
    localStorage.setItem(MEMO_KEY, JSON.stringify(memos));
  } catch(e) {}
}
function saveMemo(name) {
  const txt = document.getElementById('Memo').value.trim();
  if (!txt) return;
  const now = new Date();
  const t = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  DATA[name].memo.unshift({ time: t, text: txt, ai: null });
  saveMemosToStorage();
  render(name);
}
function clearAllMemos(name) {
  if (!confirm(name + '의 모든 메모를 삭제하시겠습니까?')) return;
  DATA[name].memo = [];
  saveMemosToStorage();
  render(name);
}
