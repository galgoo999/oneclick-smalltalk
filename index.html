function makeData(arr) {
  var name=arr[0], region=arr[1], pharmacist=arr[2], grade=arr[3];
  var sales=arr[4], salesTrend=arr[5], returnRate=arr[6], debt=arr[7];
  var monthGoal=arr[8], pbPct=arr[9], maySales=arr[10], aprSales=arr[11];
  var catPro=arr[12], catGen=arr[13], catHs=arr[14], genProds=arr[15], pbProds=arr[16]||[], pb3mReal=arr[17]||0;

  var monthCurrent=sales, monthDay=15, monthDays=30;
  var daily=[0];
  for(var i=1;i<=monthDays;i++) daily.push(i>=monthDay ? monthCurrent : Math.round(monthCurrent*i/monthDay));

  var base=sales>0 ? sales*2 : (maySales||1000000);
  var catRatio={pro:catPro,gen:catGen,hs:catHs,pb:pbPct};
  var catSales={pro:Math.round(base*catPro/100),gen:Math.round(base*catGen/100),hs:Math.round(base*catHs/100),pb:Math.round(base*pbPct/100)};
  var tUp=salesTrend.startsWith("+");
  var rnd=function(a,b){return Math.floor(Math.random()*b)+a;};
  var catTrend={pro:(tUp?"+":"-")+rnd(2,8)+"%",gen:(tUp?"+":"-")+rnd(1,6)+"%",hs:"+"+rnd(3,12)+"%",pb:salesTrend};

  var proPool=["아모디핀5mg","리피토10mg","메트포르민500mg","오메프라졸20mg","엘트로신","암로디핀","디아미크롱","바이엘아스피린"];
  var hsPool=["센트룸종합비타민","오메가31000mg","프로바이오틱스60포","루테인","밀크씨슬","콜라겐"];
  var pbPool=["태전 종합비타민","태전 프로바이오 30포","태전 칼슘마그네슘","태전 오메가3","TJ팜 루테인","TJ팜 밀크씨슬"];

  function makeList(items,total,cnt){
    cnt=Math.min(items.length,Math.max(1,cnt));
    return items.slice(0,cnt).map(function(n,i){return{name:n,sales:Math.max(10000,Math.round(total/cnt*(1.5-i*0.15)))};});
  }
  var sc=Math.max(1,Math.floor(sales/500000));
  var proTop=makeList(proPool,catSales.pro,sc+2);
  var genTop=genProds.length>0
    ? genProds.map(function(n,i){return{name:n,sales:Math.max(10000,Math.round(catSales.gen/genProds.length*(1.4-i*0.15)))};})
    : makeList(["타이레놀500mg","판콜에이","훼스탈골드","게보린","활명수"],catSales.gen,sc);
  var hsTop=makeList(hsPool,catSales.hs,sc);
  var pbTop=pbProds.length>0
    ? pbProds.map(function(p){return{name:p.name,qty:p.qty,sales:p.amt};})
    : (pbPct>0
        ? pbPool.slice(0,Math.min(4,Math.max(1,Math.floor(pbPct/3)))).map(function(n,i){
            return{name:n,qty:Math.max(1,Math.round(catSales.pb/4/80000)),sales:Math.round(catSales.pb/Math.max(1,Math.floor(pbPct/3))*(1.3-i*0.15))};
          })
        : []);

  return{name:name,region:region,pharmacist:pharmacist,grade:grade,sales:sales,salesTrend:salesTrend,
    returnRate:returnRate,debt:debt,monthGoal:monthGoal,monthCurrent:monthCurrent,
    monthDay:monthDay,monthDays:monthDays,maySales:maySales,aprSales:aprSales,
    daily:daily,proTop:proTop,genTop:genTop,hsTop:hsTop,pbTop:pbTop,
    catRatio:catRatio,catSales:catSales,catTrend:catTrend,
    pb3mAvg:pb3mReal>0?pb3mReal:Math.round(catSales.pb*0.9),news:NEWS,memo:[]};
}

var curName=null, curTab="pro";

function fmt(n){
  if(!n||n===0)return "없음";
  if(n>=100000000)return (n/100000000).toFixed(1)+"억";
  if(n>=10000000)return (n/10000000).toFixed(1)+"천만원";
  if(n>=10000)return Math.round(n/10000)+"만원";
  return n.toLocaleString()+"원";
}

function showDD(items,title){
  var dd=document.getElementById("Dropdown");
  var rows='<div class="dd-count">'+title+'</div>';
  items.forEach(function(name,i){
    var d=DATA[name];
    var gCls=d.grade==="A"?"dd-grade":d.grade==="B"?"dd-grade dd-grade-B":"dd-grade dd-grade-C";
    var tCls=d.salesTrend.startsWith("+")?"up":d.salesTrend==="0%"?"neutral":"down";
    rows+='<div class="dd-item" data-idx="'+NAMES.indexOf(name)+'">'
      +'<div><span class="dd-name">'+name+'</span><span class="'+gCls+'">'+d.grade+'</span></div>'
      +'<div class="dd-sub">'+d.region+' · '+d.pharmacist+' · 이번달 <span class="'+tCls+'">'+fmt(d.sales)+'</span></div>'
      +'</div>';
  });
  dd.innerHTML=rows;
  dd.style.display="block";
}

document.getElementById("Dropdown").addEventListener("click",function(e){
  var item=e.target.closest(".dd-item");
  if(item){var idx=parseInt(item.getAttribute("data-idx"));pickByIdx(idx);}
});

function pickByIdx(idx){
  var name=NAMES[idx];
  document.getElementById("Q").value=name;
  document.getElementById("Dropdown").style.display="none";
  render(name);
}

qEl.addEventListener("input",function(){

function switchTab(tab){
  curTab=tab;
  ["pro","gen","hs","pb"].forEach(function(t){document.getElementById("tab-"+t).classList.toggle("active",t===tab);});
  document.getElementById("tab-content").innerHTML=renderTab(curName,tab);
}

function renderTab(name,tab){
  var d=DATA[name];
  var list=tab==="pro"?d.proTop:tab==="gen"?d.genTop:tab==="hs"?d.hsTop:d.pbTop;
  var label=tab==="pro"?"전문약":tab==="gen"?"일반약":tab==="hs"?"건기식":"PB";
  var total=list.reduce(function(s,x){return s+x.sales;},0);
  var tCls=d.catTrend[tab].startsWith("+")?"up":"down";
  var h='<div class="tab-summary">'
    +'<div class="tab-sum-item"><span class="tab-sum-label">'+label+' 품목</span><span class="tab-sum-val">'+list.length+'개</span></div>'
    +'<div class="tab-sum-item"><span class="tab-sum-label">매출 합계</span><span class="tab-sum-val">'+fmt(total)+'</span></div>'
    +'<div class="tab-sum-item"><span class="tab-sum-label">비중</span><span class="tab-sum-val">'+d.catRatio[tab]+'%</span></div>'
    +'<div class="tab-sum-item"><span class="tab-sum-label">전월 대비</span><span class="tab-sum-val '+tCls+'">'+d.catTrend[tab]+'</span></div>'
    +'</div>';
  if(!list.length)return h+'<div class="empty">해당 카테고리 매출 없음 — 영업 기회!</div>';
  list.forEach(function(item,i){
    var rc=tab==="pb"?"top-row top-row-pb":"top-row";
    var ps=tab==="pb"?' style="color:#3C3489;"':'';
    var ps2=tab==="pb"?' style="color:#3C3489;font-weight:600;"':'';
    h+='<div class="'+rc+'"><div class="top-rank"'+ps+'>'+(i+1)+'</div>'
      +'<div class="top-name"'+ps2+'>'+item.name+(item.qty?' <span style="font-size:11px;color:#7F77DD;">'+item.qty+'개</span>':'')+'</div>'
      +'<span class="top-cat cat-'+tab+'">'+label+'</span>'
      +'<div class="top-amount"'+ps+'>'+fmt(item.sales)+'</div></div>';
  });
  return h;
}

    +'<div class="kv4">'
    +'<div class="kv"><div class="kvl">5월 매출</div><div class="kva">'+fmt(d.maySales)+'</div></div>'
    +'<div class="kv"><div class="kvl">4월 매출</div><div class="kva">'+fmt(d.aprSales)+'</div></div>'
    +'<div class="kv"><div class="kvl">월 목표</div><div class="kva">'+fmt(d.monthGoal)+'</div></div>'
    +'<div class="kv'+(pct>=80?" g":pct<40?" r":"")+'"><div class="kvl">달성률</div><div class="kva">'+pct+'%</div></div>'
    +'</div></div>';

  html+='<div class="card"><div class="section" style="margin-top:0">&#127919; 월 거래 금액 목표 진행률</div>'
    +'<div class="goal-box"><div class="goal-row">'
    +'<div><span class="goal-pct">'+pct+'%</span> <span style="font-size:13px;color:#6B6963;">달성 ('+d.monthDay+'일/'+d.monthDays+'일)</span></div>'
    +'<div style="text-align:right;font-size:13px;"><strong>'+fmt(d.monthCurrent)+'</strong> / '+fmt(d.monthGoal)+'</div></div>'
    +'<div class="bar-track"><div class="bar-fill" style="width:'+Math.min(pct,100)+'%;background:'+barColor+'"></div></div>'
    +'<div class="goal-meta"><span>남은 '+remDays+'일</span><span>일평균 '+fmt(dailyNeed)+' 필요</span><span>'+(pct>=100?"목표 달성! &#127881;":"목표까지 "+fmt(remaining))+'</span></div></div>'
    +'<div class="chart-wrap"><canvas id="DailyChart"></canvas></div></div>';

  html+='<div class="card"><div class="section" style="margin-top:0">&#128202; 카테고리 분석</div>'
    +'<div class="cat-grid"><div class="chart-square"><canvas id="CatChart"></canvas></div><div>';
  [["전문약","pro","#378ADD"],["일반약","gen","#EF9F27"],["건기식","hs","#97C459"],["PB (자체)","pb","#7F77DD"]].forEach(function(c){
    var lbl=c[0],key=c[1],color=c[2],isPb=(key==="pb");
    var tC2=d.catTrend[key].startsWith("+")?"up":"down";
    var style=isPb?"background:#F5F4FE;padding:8px 10px;border-radius:6px;border-bottom:none;margin-top:6px;":"";
    var ns=isPb?' style="color:#3C3489;"':'';
    html+='<div class="cat-item" style="'+style+'"><div><span class="cat-dot" style="background:'+color+'"></span><strong'+ns+'>'+lbl+'</strong> ('+d.catRatio[key]+'%)</div>'
      +'<div'+ns+'>'+fmt(d.catSales[key])+' <span class="'+tC2+'" style="font-size:12px;">'+d.catTrend[key]+'</span></div></div>';
  });
  html+='</div></div></div>';

  html+='<div class="card card-pb"><div class="section" style="margin-top:0;color:#3C3489;">&#128142; PB 제품 분석</div>'
    +'<div class="pb-hero"><div class="pb-hero-row">'
    +'<div><span class="pb-pct">'+d.catRatio.pb+'%</span> <span style="font-size:13px;color:#534AB7;">전체 매출 중 PB 비중</span></div>'
    +'<div><span class="'+(d.catTrend.pb.startsWith("+")?"up":"down")+'" style="font-weight:600;">전월 대비 '+d.catTrend.pb+'</span></div></div>'
    +'<div class="pb-grid">'
    +'<div class="pb-stat"><div class="pb-stat-label">이번달 PB 매출</div><div class="pb-stat-value">'+fmt(pbMonth)+'</div><div class="pb-stat-sub">'+d.monthDay+'일 차 누적</div></div>'
    +'<div class="pb-stat"><div class="pb-stat-label">PB 3개월 평균</div><div class="pb-stat-value">'+fmt(d.pb3mAvg)+'</div><div class="pb-stat-sub">최근 3개월 월평균</div></div>'
    +'<div class="pb-stat"><div class="pb-stat-label">PB 상품 수</div><div class="pb-stat-value">'+(d.pbTop.length>0?d.pbTop.length+"종":"미발주")+'</div><div class="pb-stat-sub">이달 취급</div></div>'
    +'</div></div>'
    +'<div class="insight" style="background:#F5F4FE;color:#3C3489;"><strong>영업 인사이트:</strong> '
    +(d.catRatio.pb>=15?"&#10003; PB 비중 우수. 신제품 PB 카테고리 확장 권장.":d.catRatio.pb>=5?"&#9711; PB 평균 수준. PB 품목 추가 도입으로 마진 개선 가능.":"&#9888; PB 비중 낮음. 마진 높은 PB 우선 영업 필요.")
    +'</div></div>';

  html+='<div class="card"><div class="section" style="margin-top:0">&#127942; 매출 상위 품목</div>'
    +'<div class="tabs">'
    +'<button class="tab tab-pro active" id="tab-pro" data-tab="pro">전문약</button>'
    +'<button class="tab tab-gen" id="tab-gen" data-tab="gen">일반약</button>'
    +'<button class="tab tab-hs" id="tab-hs" data-tab="hs">건기식</button>'
    +'<button class="tab tab-pb" id="tab-pb" data-tab="pb">PB (이달)</button>'
    +'</div><div id="tab-content">'+renderTab(name,"pro")+'</div></div>';

  html+='<div class="card"><div class="section" style="margin-top:0">&#128240; 오늘의 이슈</div>'
    +'<div style="font-size:12px;color:#1D9E75;margin-bottom:8px;font-weight:600;">&#127758; 전국 약국 시장</div>';
  NEWS.market.forEach(function(n){
    html+='<div class="news-item"><div style="font-weight:600;margin-bottom:4px;">'+n.title+'</div>'
      +'<div style="color:#6B6963;margin-bottom:6px;">'+n.desc+'</div>'
      +'<a href="'+n.link+'" target="_blank" style="color:#1D9E75;font-size:12px;font-weight:500;">기사 보기 &#8594;</a>'
      +' <span style="color:#999;font-size:11px;">'+n.source+'</span></div>';
  });
  html+='<div style="font-size:12px;color:#3C3489;margin:14px 0 8px;font-weight:600;">&#128205; 광주&#183;전남 지역</div>';
  NEWS.local.forEach(function(n){
    html+='<div class="news-item"><div style="font-weight:600;margin-bottom:4px;">'+n.title+'</div>'
      +'<div style="color:#6B6963;margin-bottom:6px;">'+n.desc+'</div>'
      +'<a href="'+n.link+'" target="_blank" style="color:#3C3489;font-size:12px;font-weight:500;">기사 보기 &#8594;</a>'
      +' <span style="color:#999;font-size:11px;">'+n.source+'</span></div>';
  });
  html+='</div>';

  html+='<div class="card"><div class="section" style="margin-top:0">&#128221; 거래처 메모</div>'
    +'<textarea class="memo-input" id="MemoTxt" placeholder="거래처 문의, 미팅 내용을 기록하세요..."></textarea>'
    +'<div><button class="memo-btn" id="SaveMemoBtn">&#128190; 저장</button><button class="memo-btn" id="ClearMemoBtn">&#128465; 전체삭제</button></div>';
  if(!d.memo.length){
    html+='<div style="margin-top:10px;padding:12px;text-align:center;color:#6B6963;font-size:13px;background:#F5F4EE;border-radius:8px;">저장된 메모가 없습니다.</div>';
  } else {
    d.memo.forEach(function(m){html+='<div class="memo-item"><div class="memo-time">'+m.time+'</div>'+m.text+'</div>';});
  }
  html+='</div>';

  document.getElementById("Result").innerHTML=html;

  document.getElementById("SaveMemoBtn").addEventListener("click",function(){
    var txt=document.getElementById("MemoTxt").value.trim();
    if(!txt)return;
    var now=new Date();
    var t=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0")+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
    DATA[name].memo.unshift({time:t,text:txt});
    saveMemos();render(name);
  });
  document.getElementById("ClearMemoBtn").addEventListener("click",function(){
    if(confirm(name+" 메모를 모두 삭제할까요?")){DATA[name].memo=[];saveMemos();render(name);}
  });

  var dc=Chart.getChart("DailyChart"),cc=Chart.getChart("CatChart");
  if(dc)dc.destroy();if(cc)cc.destroy();
  setTimeout(function(){drawDaily(d.daily,d.monthGoal,d.monthDays);drawCat(d.catRatio);},80);
}

function drawDaily(data,goal,days){
  var ctx=document.getElementById("DailyChart");if(!ctx)return;
  var gl=Array.from({length:days+1},function(_,i){return Math.round(goal/days*i);});
  new Chart(ctx,{type:"line",
    data:{labels:Array.from({length:days+1},function(_,i){return i;}),
      datasets:[
        {label:"실제 누적",data:data,borderColor:"#1D9E75",backgroundColor:"rgba(29,158,117,0.1)",fill:true,tension:0.3,pointRadius:0},
        {label:"목표선",data:gl,borderColor:"#888780",borderDash:[4,4],fill:false,pointRadius:0}
      ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:"bottom",labels:{font:{size:11}}}},
      scales:{
        y:{beginAtZero:true,ticks:{font:{size:10},callback:function(v){return Math.round(v/10000)+"만";}}},
        x:{ticks:{font:{size:10},callback:function(v,i){return i%5===0?i+"일":"";}}}
      }}
  });
}

function drawCat(ratio){
  var ctx=document.getElementById("CatChart");if(!ctx)return;
  new Chart(ctx,{type:"doughnut",
    data:{labels:["전문약","일반약","건기식","PB"],
      datasets:[{data:[ratio.pro,ratio.gen,ratio.hs,ratio.pb],backgroundColor:["#378ADD","#EF9F27","#97C459","#7F77DD"],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:"right",labels:{font:{size:12}}},
        tooltip:{callbacks:{label:function(c){return c.label+": "+c.parsed+"%";}}}},
      cutout:"60%"}
  });
}

var MEMO_KEY="oneclick-kim-memos";
function saveMemos(){
  try{var m={};NAMES.forEach(function(n){if(DATA[n].memo&&DATA[n].memo.length)m[n]=DATA[n].memo;});localStorage.setItem(MEMO_KEY,JSON.stringify(m));}catch(e){}
}
try{
  var saved=localStorage.getItem(MEMO_KEY);
  if(saved){var memos=JSON.parse(saved);Object.keys(memos).forEach(function(n){if(DATA[n])DATA[n].memo=memos[n];});}
}catch(e){}
</script>
</body>
</html>
